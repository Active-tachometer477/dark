name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-24.04
            jsc-pkg: libjavascriptcoregtk-4.1-dev

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install JavaScriptCore (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.jsc-pkg }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout 120s ./...
        env:
          CGO_ENABLED: ${{ runner.os == 'Linux' && '0' || '' }}
