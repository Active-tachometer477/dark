# Fly.io configuration for dark applications.
#
# Deploy:
#   fly launch
#   fly deploy
#
# Set secrets:
#   fly secrets set SESSION_SECRET=$(openssl rand -hex 32)

app = "my-dark-app"
primary_region = "nrt"  # Tokyo

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
